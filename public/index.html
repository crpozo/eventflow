<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Warm up the cross-region (sa-east-1) AppSync + CloudFront connections
         early so DNS/TLS overlaps with the bundle download on the landing. -->
    <link rel="preconnect" href="https://t55gjdtdmvhp5bfc4wtu6yygwa.appsync-api.sa-east-1.amazonaws.com" crossorigin />
    <link rel="preconnect" href="https://dnuc5lxyun5b.cloudfront.net" crossorigin />
    <link rel="dns-prefetch" href="https://t55gjdtdmvhp5bfc4wtu6yygwa.appsync-api.sa-east-1.amazonaws.com" />
    <link rel="dns-prefetch" href="https://dnuc5lxyun5b.cloudfront.net" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />

    <meta property="og:title" content="Universidad San Francisco de Quito" />
    <meta property="og:image" content="https://eventflow.ec/logo512.png" />
    <meta property="og:type" content="website" />

    <link rel="apple-touch-icon" href="/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <!-- Loader estático pre-React: se ve mientras descarga/ejecuta el bundle,
         idéntico al .loader de index.css (anillo 60px, top #212529 + bottom
         #df1923, 1s) y centrado en viewport, igual que FullScreenLoader.
         React lo reemplaza al montar en #root — no necesita JS de limpieza.
         Solo CSS inline: el CSS del bundle aún no existe en este punto. -->
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff; /* lightPrimary — OJO: tailwind.config.js remapea
                             lightPrimary a #fff (no el #F4F7FE de Horizon);
                             debe coincidir con FullScreenLoader para que no
                             haya flash de color cuando React monta. */
      }
      #initial-loader .initial-loader-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        box-sizing: border-box;
        border: 4px solid transparent;
        border-top-color: #212529;
        border-bottom-color: #df1923;
        animation: initial-loader-rotation 1s linear infinite;
        margin-bottom: 25px; /* mismo margen que .loader */
      }
      #initial-loader p {
        margin: 0;
        font-family: sans-serif;
        font-size: 16px;
        color: #4a5568;
      }
      @keyframes initial-loader-rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <title>Eventflow</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="initial-loader">
        <div class="initial-loader-ring"></div>
        <p>Cargando…</p>
      </div>
    </div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
