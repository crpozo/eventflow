# SonarQube / SonarCloud — configuración del proyecto EventFlow.
#
# Cómo correr el análisis (necesitas el host y un token del servidor):
#   1. Genera la cobertura:   npm run test:coverage
#   2. Corre el scanner:
#        sonar-scanner \
#          -Dsonar.host.url=https://TU-SONARQUBE \
#          -Dsonar.token=$SONAR_TOKEN
#      (o con Docker, sin instalar nada:
#        docker run --rm -e SONAR_HOST_URL=https://TU-SONARQUBE \
#          -e SONAR_TOKEN=$SONAR_TOKEN \
#          -v "$PWD:/usr/src" sonarsource/sonar-scanner-cli)
#
# El host y el token NUNCA van en este archivo (van por CLI/env/CI secrets).
# En SonarCloud agrega además: sonar.organization=<tu-org>.

sonar.projectKey=crpozo_eventflow
sonar.projectName=EventFlow
sonar.organization=crpozo

# Código fuente: la app + los Lambdas del backend.
sonar.sources=src,amplify/backend/function
sonar.exclusions=**/node_modules/**,build/**,coverage/**,\
  src/graphql/**,src/models/**,src/aws-exports.js,\
  amplify/backend/function/*/src/node_modules/**,\
  amplify/#current-cloud-backend/**

# Tests (viven dentro de src/, convención CRA/Jest).
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Cobertura: la genera `npm run test:coverage` (Jest → lcov).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/ui-components/**,src/views/**,src/components/**,\
  src/layouts/**,src/providers/**,src/routes.js,src/App.jsx

sonar.sourceEncoding=UTF-8
