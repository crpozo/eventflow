# SonarQube / SonarCloud — configuración del proyecto EventFlow.
#
# Análisis local manual (el CI lo hace solo en cada push — .github/workflows/sonar.yml):
#   npm run test:coverage
#   npx sonarqube-scanner@4 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN
# El token NUNCA va en este archivo (CLI/env/CI secret).

sonar.projectKey=crpozo_eventflow
sonar.projectName=EventFlow
sonar.organization=crpozo

# TODO el código del repo. Fuera solo lo que no es código propio:
# dependencias, artefactos de build/scanner, y el espejo
# amplify/#current-cloud-backend (copia idéntica del backend desplegado —
# analizarlo duplicaría cada Lambda y falsearía métricas y duplicación).
sonar.sources=.
# Assets binarios (imágenes/fuentes/video) fuera: el scanner los leía como
# texto y generaba warnings de encoding UTF-8 en cada análisis.
sonar.exclusions=**/node_modules/**,build/**,coverage/**,.scannerwork/**,\
  amplify/#current-cloud-backend/**,\
  **/*.test.js,**/*.test.jsx,\
  **/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.webp,**/*.ico,**/*.svg,\
  **/*.ttf,**/*.woff,**/*.woff2,**/*.mov,**/*.mp4,**/*.pdf

# Tests (excluidos de sources arriba; incluidos aquí).
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Cobertura: la genera `npm run test:coverage` (Jest → lcov), medida sobre
# todo el código sin exclusiones.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Detector de copia-pega (CPD): fuera el código GENERADO — los pares
# Create/Update de Amplify Studio y schema.js son gemelos por diseño y no son
# duplicación accionable (amplify pull los reescribe). El análisis de
# bugs/smells/seguridad sí sigue corriendo sobre ellos.
# Cobertura: el codegen puro no es testeable con sentido (queries/schema
# generados — mismo alcance que collectCoverageFrom de Jest). El análisis de
# bugs/seguridad/smells SÍ corre sobre ellos.
# infra/: lambdas operativas en Python desplegadas a mano (fuera del pipeline
# de Amplify); Jest no puede cubrirlas y no hay harness de pytest en CI. El
# análisis de bugs/seguridad/smells SÍ corre sobre ellas.
sonar.coverage.exclusions=src/graphql/**,src/models/**,src/aws-exports.js,src/index.js,src/reportWebVitals.js,src/setupTests.js,src/testUtils/**,infra/**

sonar.cpd.exclusions=src/ui-components/**,src/models/**,src/graphql/**

sonar.sourceEncoding=UTF-8

# Versión exacta de Python de las lambdas de infra/ (runtime: python3.13);
# sin esto el scanner asume "cualquier Python 3" y lo advierte en cada corrida.
sonar.python.version=3.13
